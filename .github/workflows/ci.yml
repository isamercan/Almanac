name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test (iOS Simulator)
    runs-on: macos-15
    env:
      # Forwarded into the test runner as `CI` → SnapshotTests skip (references are OS-specific).
      TEST_RUNNER_CI: "1"
    steps:
      - uses: actions/checkout@v4

      # The demo project uses Xcode 16 file-system synchronized groups (objectVersion 77) and the
      # library relies on Swift 6 main-actor inference, so pin a modern Xcode.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      # Device names differ by Xcode (iPhone 16 vs 17 …), so pick the newest available iPhone.
      - name: Pick a simulator
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [0-9]+' | sort -V | uniq | tail -1)
          echo "Selected simulator: $DEVICE"
          echo "SIM=platform=iOS Simulator,name=$DEVICE" >> "$GITHUB_ENV"

      - name: Test Almanac
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme Almanac \
            -destination "$SIM" \
            -resultBundlePath Almanac.xcresult

      - name: Build CalendarDemo app
        working-directory: Demo
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme CalendarDemo \
            -project calendar-ios.xcodeproj \
            -destination "$SIM" \
            CODE_SIGNING_ALLOWED=NO

  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Run SwiftLint (if available)
        run: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint --strict
          else
            echo "SwiftLint not installed on the runner; skipping. (brew install swiftlint to enable)"
          fi
